services:
  searxng:
    image: searxng/searxng:latest
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET=${SEARXNG_SECRET:?set SEARXNG_SECRET in .env}
    restart: unless-stopped

  crawl4ai:
    image: unclecode/crawl4ai:latest
    ports:
      - "127.0.0.1:11235:11235"
    env_file:
      - ./crawl4ai/.llm.env
    shm_size: "2gb"
    restart: unless-stopped

  reranker:
    build: ./reranker
    ports:
      - "127.0.0.1:7997:7997"
    environment:
      - MODEL_ID=${RERANKER_MODEL_ID:-lexical-idf}
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - CRAWL4AI_URL=http://crawl4ai:11235
      - RERANKER_URL=http://reranker:7997
      - SEARCH_CANDIDATES=${SEARCH_CANDIDATES:-10}
      - MAX_RESULTS=${MAX_RESULTS:-5}
      - CHUNK_SIZE=${CHUNK_SIZE:-1800}
      - CHUNKS_PER_PAGE=${CHUNKS_PER_PAGE:-3}
      - CRAWL_CONCURRENCY=${CRAWL_CONCURRENCY:-3}
    depends_on:
      - searxng
      - crawl4ai
      - reranker
    restart: unless-stopped
